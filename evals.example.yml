# Each entry tests one prompt file.
#
# id:     unique identifier for this test case
# tests:  the prompt ID this eval targets — derived from the prompt filename
#         (e.g. "summarizer" from "summarizer.md", or the parent dir name)
# input:  the user message sent to the compressed prompt during validation
# assert: list of assertions checked against the model's response
#
# Assertion types:
#   contains:     output must include this string
#   not_contains: output must not include this string
#   matches:      output must match this regex
#   not_matches:  output must not match this regex

- id: summarizer-basic
  tests: summarizer
  input: "Summarize this article: The quick brown fox jumps over the lazy dog."
  assert:
    - contains: "fox"
    - not_contains: "I cannot"

- id: summarizer-rejects-empty
  tests: summarizer
  input: ""
  assert:
    - not_matches: "^$"

- id: code-reviewer-flags-unused-vars
  tests: code-reviewer
  input: "Review this code: def foo():\n    x = 1\n    return 42"
  assert:
    - contains: "unused"
    - not_contains: "looks good"
